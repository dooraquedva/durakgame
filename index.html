<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Дурак — игра</title>
    <style>
        * { touch-action: manipulation; user-select: none; }
        body { background: #1a472a; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; font-family: system-ui; }
        #game { background: #2e7d32; border-radius: 40px; padding: 15px; width: 98%; max-width: 500px; }
        .hand, .table, .info { background: #1b5e20; border-radius: 28px; margin: 12px 0; padding: 12px; }
        .hand { min-height: 130px; }
        .table { min-height: 120px; background: #2e2e1e; display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }
        .card { background: white; width: 70px; height: 95px; border-radius: 12px; display: inline-flex; flex-direction: column; justify-content: center; align-items: center; font-weight: bold; font-size: 28px; margin: 4px; box-shadow: -2px 2px 5px rgba(0,0,0,0.3); cursor: pointer; }
        .card:active { transform: scale(0.96); }
        .red { color: #c62828; }
        button { background: #ffb74d; border: none; font-size: 1.4rem; padding: 12px 20px; border-radius: 60px; margin: 8px; }
        .info { text-align: center; color: gold; background: #0a2f1a; padding: 8px; }
    </style>
</head>
<body>
<div id="game">
    <div class="info" id="statusText">🃟 Добро пожаловать в Дурака!</div>
    <div class="table" id="tableZone">🃟 Стол пуст</div>
    <div class="hand" id="handZone">🃟 Нажми "Новая игра"</div>
    <div style="text-align: center;">
        <button onclick="alert('Работает! Сейчас добавлю бота и козыри. Обновлю через минуту.')">🔄 Новая игра</button>
    </div>
</div>
<script>
    document.getElementById('handZone').innerHTML = '<div class="card">6♥</div><div class="card">7♦</div><div class="card">8♣</div><div class="card">9♠</div><div class="card">10♥</div><div class="card">В♦</div>';
    document.getElementById('statusText').innerHTML = '✅ Игра загружена! Полная версия с ботом будет через 5 минут';
</script>
</body>
</html>
